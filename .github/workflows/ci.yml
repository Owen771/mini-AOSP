name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Detect which files changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.c'
              - '**/*.h'
              - '**/*.kt'
              - '**/*.rc'
              - '**/Makefile'
              - 'scripts/**'
              - '.github/workflows/**'

  # Full build + test — only when code changes
  run-tests:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kotlin
        run: |
          curl -sL https://github.com/JetBrains/kotlin/releases/download/v2.0.0/kotlin-compiler-2.0.0.zip -o /tmp/kotlin.zip
          sudo unzip -o /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          gcc --version | head -1
          java -version 2>&1 | head -1
          kotlinc -version 2>&1 | head -1
          make --version | head -1

      - name: Run test
        run: ./scripts/run-test.sh

  # Gate check — required by branch protection, passes if tests pass or were skipped
  build-and-verify:
    needs: [changes, run-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.run-tests.result }}" == "failure" ]]; then
            echo "Tests failed"
            exit 1
          fi
          echo "OK — tests passed or skipped (docs-only)"
