name: Auto-merge

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success' || github.event_name == 'pull_request'
    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ github.event.pull_request.number || github.event.check_suite.pull_requests[0].number }}
          merge-method: squash
          token: ${{ secrets.GITHUB_TOKEN }}
